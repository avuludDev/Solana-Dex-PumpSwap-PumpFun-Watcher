  token-metadata-updater:
    build: .
    container_name: solana-token-metadata-updater
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DB_HOST: host.docker.internal
      DB_PORT: "5433"
    # Периодически обновляет метаданные токенов в фоновом режиме.
    # Можно оставить как есть (один проход и завершение) или обернуть в простой цикл с sleep.
    command: python -u token_metadata_updater.py