version: "3.9"

services:
  solana-parser:
    build: .
    container_name: solana-parser
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DB_HOST: host.docker.internal
      DB_PORT: "5433"
    command: python -u slot_indexer.py

